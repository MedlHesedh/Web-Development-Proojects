<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Container</title>
    <style>
      body {
        padding: 20px;
        font:
          1em Helvetica Neue,
          Helvetica,
          Arial,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      p {
        margin: 0 0 1em 0;
      }

      .container {
        border: 5px solid rgb(111, 41, 97);
        border-radius: 0.5em;
        padding: 10px;
        display: flex;
        flex-direction: row;
      }

      .item {
        width: 100px;
        height: 100px;
        padding: 10px;
        background-color: rgba(111, 41, 97, 0.3);
        border: 2px solid rgba(111, 41, 97, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
    </div>
  </body>
</html>
